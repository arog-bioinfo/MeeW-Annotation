$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: entries for the sample sheet
properties:
  sample:
    type: string
    description: MAG name or unique identifier
  path:
    type: string
    description: path to the MAG FASTA file
  domain:
    type: string
    description: sample domain controlling annotation path
    enum:
      - prok
      - euk

required:
  - sample
  - path
  - domain

additionalProperties: True
