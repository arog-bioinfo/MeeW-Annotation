$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: entries for the sample sheet
properties:
  sample:
    type: string
    description: MAG name or unique identifier
  path:
    type: string
    description: path to the MAG FASTA file; environment variables and ~ are expanded and relative paths use the Snakemake working directory
  domain:
    type: string
    description: sample domain controlling annotation path
    enum:
      - prok
      - euk
  genome_type:
    type: string
    description: genome source/type controlling eukaryotic annotation path
    enum:
      - mag
      - isolate

required:
  - sample
  - path
  - domain

additionalProperties: True
