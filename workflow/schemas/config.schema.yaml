$schema: "https://json-schema.org/draft/2020-12/schema"
type: object
description: main configuration schema for the workflow
properties:
  sample_sheet:
    type: string
    description: path to sample sheet, mandatory
    default: config/samples.tsv

  directory_mode:
    type: object
    description: directory-based batch Annotation inputs, used when imported by main MeeW
    properties:
      enabled:
        type: boolean
        description: enable batch Annotation from Binning output directories instead of sample-sheet expansion
        default: false
      sample:
        type: string
        description: sample identifier used for batch output paths
        default: ""
      prok_bins_dir:
        type: string
        description: directory containing prokaryotic bins from Binning domain separation
        default: ""
      euk_bins_dir:
        type: string
        description: directory containing eukaryotic bins from Binning domain separation
        default: ""
      checkm2_report:
        type: string
        description: CheckM2 quality_report.tsv for prokaryotic bins
        default: ""
      eukcc_report:
        type: string
        description: EukCC eukcc.csv for eukaryotic bins
        default: ""
    required:
      - enabled
    additionalProperties: false

  qa_filter:
    type: object
    description: external CheckM2/EukCC QA filtering applied before target expansion
    properties:
      enabled:
        type: boolean
        description: enable filtering by external QA reports
        default: false
      min_completeness:
        type: number
        description: minimum completeness required to keep a sample
        default: 50.0
      max_contamination:
        type: number
        description: maximum contamination allowed to keep a sample
        default: 10.0
      checkm2_reports:
        type: array
        description: CheckM2 TSV report paths for prokaryotic samples
        items:
          type: string
        default: []
      eukcc_reports:
        type: array
        description: EukCC CSV report paths for eukaryotic samples
        items:
          type: string
        default: []
      missing_sample:
        type: string
        description: behavior when a sample is missing from its QA report
        enum:
          - error
          - keep
          - drop
        default: error
    additionalProperties: false

  prodigal:
    type: object
    description: parameters for Prodigal gene prediction
    properties:
      extra:
        type: string
        description: extra CLI options passed to Prodigal wrapper
    additionalProperties: false

  bakta:
    type: object
    description: parameters for Bakta annotation
    properties:
      db:
        type: string
        description: path to Bakta database directory
      extra:
        type: string
        description: extra CLI options passed to Bakta wrapper
    required:
      - db
    additionalProperties: false

  gtdbtk:
    type: object
    description: parameters for GTDB-Tk classification
    properties:
      enabled:
        type: boolean
        description: enable optional GTDB-Tk classification for prokaryotic genomes only
        default: false
      data_dir:
        type: string
        description: path to GTDB-Tk database directory
      extra:
        type: string
        description: extra CLI options passed to GTDB-Tk wrapper
    allOf:
      - if:
          required:
            - enabled
          properties:
            enabled:
              const: true
        then:
          required:
            - data_dir
          properties:
            data_dir:
              minLength: 1
    additionalProperties: false

  metaeuk:
    type: object
    description: parameters for MetaEuk gene prediction
    properties:
      db:
        type: string
        description: path to MetaEuk reference database
      extra:
        type: string
        description: extra CLI options passed to MetaEuk wrapper
    required:
      - db
    additionalProperties: false

  recognizer_prok:
    type: object
    description: parameters for prokaryotic reCOGnizer domain annotation
    properties:
      resources_dir:
        type: string
        description: path to prokaryotic reCOGnizer database directory
      extra:
        type: string
        description: extra CLI options passed to prokaryotic reCOGnizer wrapper
    required:
      - resources_dir
    additionalProperties: false

  recognizer_euk:
    type: object
    description: parameters for eukaryotic reCOGnizer domain annotation
    properties:
      resources_dir:
        type: string
        description: path to eukaryotic reCOGnizer database directory
      custom_db:
        type: string
        description: path to KOG/custom database for eukaryotic reCOGnizer; empty disables custom DB
      extra:
        type: string
        description: extra CLI options passed to eukaryotic reCOGnizer wrapper
    required:
      - resources_dir
    additionalProperties: false

  funannotate2:
    type: object
    description: parameters for Funannotate2 eukaryotic isolate annotation
    properties:
      enabled:
        type: boolean
        description: enable Funannotate2 targets for eukaryotic isolate genomes
        default: true
      db_dir:
        type: string
        description: path to the Funannotate2 database directory
      install_db:
        type: boolean
        description: install missing Funannotate2 databases during real workflow execution
        default: true
      databases:
        type: array
        description: Funannotate2 database names to install when db_dir is missing
        items:
          type: string
        default:
          - all
      extra_install:
        type:
          - string
          - "null"
        description: extra CLI options passed to Funannotate2 install
      species:
        type:
          - string
          - "null"
        description: species name passed to Funannotate2 when provided
      strain:
        type:
          - string
          - "null"
        description: strain name passed to Funannotate2 when provided
      params:
        type:
          - string
          - "null"
        description: Funannotate2 parameters file passed to predict when provided
      pretrained:
        type:
          - string
          - "null"
        description: Funannotate2 pretrained parameters passed to predict when provided
      extra_clean:
        type:
          - string
          - "null"
        description: extra CLI options passed to Funannotate2 clean
      extra_train:
        type:
          - string
          - "null"
        description: extra CLI options passed to Funannotate2 train
      extra_predict:
        type:
          - string
          - "null"
        description: extra CLI options passed to Funannotate2 predict
      extra_annotate:
        type:
          - string
          - "null"
        description: extra CLI options passed to Funannotate2 annotate
    required:
      - enabled
      - db_dir
      - install_db
      - databases
    additionalProperties: false

  upimapi:
    type: object
    description: parameters for UPIMAPI functional annotation
    properties:
      db:
        type: string
        description: UPIMAPI built-in database name to use (for example, swissprot)
      db_custom:
        type: string
        description: path to a custom UPIMAPI database FASTA; leave empty when using db
      resources_dir:
        type: string
        description: path to UPIMAPI resources database directory
      extra:
        type: string
        description: extra CLI options passed to UPIMAPI wrapper
      skip_db_check_if_exists:
        type: boolean
        description: automatically pass --skip-db-check when the selected UPIMAPI database FASTA already exists in the configured resources directory
        default: true
    additionalProperties: false

  threads:
    type: object
    description: computational resources presets
    properties:
      high:
        type: integer
      medium:
        type: integer
      low:
        type: integer
    additionalProperties: false

required:
  - sample_sheet
  - qa_filter
  - prodigal
  - bakta
  - metaeuk
  - recognizer_prok
  - recognizer_euk
  - funannotate2
  - upimapi
  - threads
